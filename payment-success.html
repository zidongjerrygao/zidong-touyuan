<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>订阅成功 — 紫东投研</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>
    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      background: #f9fafb;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Sans SC', sans-serif;
      padding: 24px;
    }

    .success-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
      padding: 56px 48px;
      text-align: center;
      width: 100%;
      max-width: 460px;
      animation: fadeInUp 0.4s ease both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .success-icon {
      font-size: 80px;
      line-height: 1;
      margin-bottom: 24px;
      animation: popIn 0.5s 0.1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.5); }
      to { opacity: 1; transform: scale(1); }
    }

    .success-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.04em;
      margin-bottom: 20px;
    }

    .success-title {
      font-size: 26px;
      font-weight: 900;
      color: #111827;
      margin: 0 0 12px;
      line-height: 1.3;
    }

    .success-sub {
      font-size: 15px;
      color: #6b7280;
      margin: 0 0 32px;
      line-height: 1.6;
    }

    .perks-list {
      list-style: none;
      margin: 0 0 36px;
      padding: 0;
      text-align: left;
      background: #f9fafb;
      border-radius: 12px;
      padding: 20px 24px;
    }
    .perks-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: #374151;
      padding: 6px 0;
    }
    .perk-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #C41230;
      flex-shrink: 0;
    }

    .btn-start {
      display: inline-block;
      width: 100%;
      padding: 15px 32px;
      background: linear-gradient(135deg, #C41230 0%, #a30e28 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Noto Sans SC', sans-serif;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      box-shadow: 0 4px 18px rgba(196,18,48,0.3);
      letter-spacing: 0.02em;
    }
    .btn-start:hover { opacity: 0.9; }
    .btn-start:active { transform: scale(0.99); }

    .footer-note {
      margin-top: 24px;
      font-size: 12px;
      color: #9ca3af;
      line-height: 1.6;
    }

    .site-logo {
      margin-bottom: 32px;
      font-size: 22px;
      font-weight: 900;
      color: #111827;
      letter-spacing: 0.02em;
    }
    .site-logo span { color: #C41230; }

    .confetti-line {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 18px;
    }

    @media (max-width: 480px) {
      .success-card { padding: 40px 24px; }
      .success-title { font-size: 22px; }
    }
  </style>
</head>
<body>

  <div class="site-logo"><span>紫</span>东投研</div>

  <div class="success-card">

    <div class="confetti-line">🎊 🎉 🎊</div>

    <div class="success-icon">⭐</div>

    <div class="success-badge">✓ 专业会员已激活</div>

    <h1 class="success-title">欢迎成为紫东投研<br>专业会员！</h1>

    <p class="success-sub">您的订阅已激活，即可享受全部专业功能。</p>

    <ul class="perks-list">
      <li><span class="perk-dot"></span>每日市场简报全文已解锁</li>
      <li><span class="perk-dot"></span>财报分析与策略报告不限阅读</li>
      <li><span class="perk-dot"></span>TSLA &amp; NVDA 每日交易计划已开通</li>
      <li><span class="perk-dot"></span>所有深度研究报告立即可读</li>
    </ul>

    <a href="index.html" class="btn-start">开始阅读</a>

    <p class="footer-note">
      如有任何问题，请联系我们的客服团队。<br>
      您可在账户设置中随时管理或取消订阅。
    </p>

  </div>

</body>
</html>
