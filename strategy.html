<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>投研策略 — 竑睿投研</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="app.js" defer></script>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-logo-zd">竑<span>睿投研</span></div>
    <div class="nav-links" id="nav-links"></div>
    <div id="nav-user-info"></div>
    <div class="nav-actions" id="nav-actions"></div>
  </div>
</nav>

<div class="ticker-bar" id="ticker-bar"></div>

<main class="page">

  <div class="section-head" style="margin-bottom:6px;">
    <div>
      <h2 style="margin-bottom:4px;">投研策略</h2>
      <p style="font-size:14px;color:var(--text-muted);margin:0;">竑睿投研团队每周深度策略报告</p>
    </div>
  </div>

  <div style="height:24px;"></div>

  <div class="admin-tabs" id="strategy-tabs">
    <div class="admin-tab active" data-cat="Macro">宏观策略</div>
    <div class="admin-tab" data-cat="Equity">股票策略</div>
    <div class="admin-tab" data-cat="Credit">信用策略</div>
  </div>

  <div id="strategy-content" style="margin-top:24px;">
    <div class="loading-center"><div class="spinner"></div></div>
  </div>

</main>

<footer class="footer">
  © 2026 竑睿投研 · <a href="#">隐私政策</a> · <a href="#">使用条款</a>
</footer>

<script>
const API = "https://moomooinsights-production.up.railway.app";

function translateAuthor(author) {
  const map = {
    "Moomoo Insights": "投研团队",
    "Trader Moo": "交易大师",
    "Madison": "麦迪逊",
    "Cembalest": "策略师",
    "DBS CIO": "星展首席投资官",
  };
  return map[author] || author || "投研团队";
}

function translateCategory(cat) {
  const map = {
    "Daily Brief": "每日简报",
    "Earnings": "财报速递",
    "Market Analysis": "市场深度研究",
    "Macro": "宏观策略",
    "Equity": "股票策略",
    "Credit": "信用策略",
    "TSLA": "特斯拉",
    "NVDA": "英伟达",
  };
  return map[cat] || cat || "投研";
}

function categoryEmoji(cat) {
  const map = {
    "Macro": "🌐", "Equity": "📈", "Credit": "💳",
    "Market Analysis": "📊", "Earnings": "💰", "Daily Brief": "📰",
    "TSLA": "🚗", "NVDA": "🟢",
  };
  return map[cat] || "📊";
}

function formatDateZH(d) {
  if (!d) return "";
  return new Date(d).toLocaleDateString("zh-CN", { year: "numeric", month: "long", day: "numeric" });
}

function catIcon(cat) {
  return { Macro: "🌐", Equity: "📈", Credit: "💳" }[cat] || "📊";
}

function catNameZH(cat) {
  return { Macro: "宏观策略", Equity: "股票策略", Credit: "信用策略" }[cat] || cat;
}

function articleCardHTML(a) {
  const title = a.title_zh_cn || a.title;
  const excerpt = a.excerpt_zh_cn || a.excerpt || "";
  return `
    <a href="article.html?id=${a.id}" class="article-card" style="text-decoration:none;color:inherit;display:flex;flex-direction:column;">
      <div class="article-card-img-placeholder" style="padding:0;overflow:hidden;">${articleThumbnailSVG(a)}</div>
      <div class="article-card-body">
        <div class="article-card-category">${translateCategory(a.category)}</div>
        <div class="article-card-title">${title}</div>
        <div class="article-card-excerpt">${excerpt}</div>
        <div class="article-card-meta">
          <span>${translateAuthor(a.author)}</span>
          <span class="dot">·</span>
          <span>${formatDateZH(a.created_at)}</span>
        </div>
      </div>
    </a>`;
}

let activeCategory = "Macro";

document.querySelectorAll("#strategy-tabs .admin-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll("#strategy-tabs .admin-tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    activeCategory = tab.dataset.cat;
    loadStrategy();
  });
});

async function loadStrategy() {
  const container = document.getElementById("strategy-content");
  container.innerHTML = `<div class="loading-center"><div class="spinner"></div></div>`;
  try {
    const articles = await fetch(`${API}/api/articles?category=${encodeURIComponent(activeCategory)}`).then(r => r.json());
    if (!articles.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="icon">${catIcon(activeCategory)}</div>
          <p>暂无${catNameZH(activeCategory)}内容。</p>
        </div>`;
      return;
    }
    const featured = articles[0];
    const rest = articles.slice(1);
    const heroTitle = featured.title_zh_cn || featured.title;
    const heroExcerpt = featured.excerpt_zh_cn || featured.excerpt || "";
    let html = `
      <a href="article.html?id=${featured.id}" class="hero-article" style="text-decoration:none;color:inherit;">
        <div class="hero-article-img" style="padding:0;overflow:hidden;">${articleThumbnailSVG(featured)}</div>
        <div class="hero-article-body">
          <span class="hero-tag">${translateCategory(featured.category)}</span>
          <h1 class="hero-title">${heroTitle}</h1>
          <p class="hero-excerpt">${heroExcerpt}</p>
          <div class="hero-meta">${translateAuthor(featured.author)} · ${formatDateZH(featured.created_at)}</div>
        </div>
      </a>
    `;
    if (rest.length) {
      html += `
        <div class="section-head" style="margin-top:32px;">
          <h2>更多${catNameZH(activeCategory)}</h2>
        </div>
        <div class="grid-3">${rest.map(articleCardHTML).join("")}</div>
      `;
    }
    container.innerHTML = html;
  } catch (e) {
    container.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>加载失败：${e.message}</p></div>`;
  }
}

document.addEventListener("DOMContentLoaded", loadStrategy);
</script>
</body>
</html>
