<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文章详情 — 竑睿投研</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=20260515" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    .article-page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }
    .article-top-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      background: #fff;
      color: #374151;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
      font-family: 'Noto Sans SC', sans-serif;
    }
    .btn-back:hover { background: #f3f4f6; border-color: #d1d5db; }
    .btn-pdf {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border: none;
      border-radius: 6px;
      background: #C41230;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s;
      font-family: 'Noto Sans SC', sans-serif;
    }
    .btn-pdf:hover { background: #a30e28; }
    .breadcrumb {
      font-size: 13px;
      color: #6b7280;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .breadcrumb a { color: #6b7280; text-decoration: none; }
    .breadcrumb a:hover { color: #C41230; }
    .breadcrumb-sep { color: #d1d5db; }
    .breadcrumb-current { color: #111827; font-weight: 500; }

    .article-layout {
      display: flex;
      gap: 40px;
      align-items: flex-start;
    }
    .article-main {
      flex: 1;
      min-width: 0;
      max-width: 740px;
    }
    .article-sidebar {
      width: 320px;
      flex-shrink: 0;
    }

    .article-category-tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 4px;
      background: #fef2f4;
      color: #C41230;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 14px;
      letter-spacing: 0.03em;
    }
    .article-title {
      font-size: 28px;
      font-weight: 900;
      color: #111827;
      line-height: 1.35;
      margin: 0 0 16px;
    }
    .article-excerpt {
      font-size: 16px;
      color: #4b5563;
      line-height: 1.6;
      margin-bottom: 20px;
      border-left: 3px solid #C41230;
      padding-left: 14px;
    }
    .article-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 13px;
      color: #6b7280;
      padding-bottom: 20px;
      border-bottom: 1px solid #e5e7eb;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .article-meta-author {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
      color: #374151;
    }
    .author-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #C41230 0%, #6B0A1A 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
    }
    .article-content {
      font-size: 15px;
      line-height: 1.85;
      color: #1f2937;
    }
    .article-content h1,
    .article-content h2,
    .article-content h3 {
      color: #111827;
      font-weight: 700;
      margin-top: 32px;
      margin-bottom: 12px;
    }
    .article-content h2 { font-size: 20px; }
    .article-content h3 { font-size: 17px; }
    .article-content p { margin-bottom: 16px; }
    .article-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 24px 0;
      font-size: 14px;
    }
    .article-content th {
      background: #f9fafb;
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      border: 1px solid #e5e7eb;
    }
    .article-content td {
      padding: 9px 12px;
      border: 1px solid #e5e7eb;
    }
    .article-content tr:nth-child(even) td { background: #fafafa; }
    .article-content img {
      max-width: 100%;
      border-radius: 8px;
      margin: 16px 0;
    }
    .article-content canvas {
      max-width: 100%;
    }

    /* Sidebar */
    .sidebar-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      overflow: hidden;
      position: sticky;
      top: 80px;
    }
    .sidebar-card-header {
      padding: 16px 20px;
      border-bottom: 1px solid #f3f4f6;
      font-size: 15px;
      font-weight: 700;
      color: #111827;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-card-header::before {
      content: '';
      display: block;
      width: 4px;
      height: 16px;
      background: #C41230;
      border-radius: 2px;
    }
    .related-list { list-style: none; margin: 0; padding: 0; }
    .related-item {
      padding: 14px 20px;
      border-bottom: 1px solid #f3f4f6;
      transition: background 0.12s;
    }
    .related-item:last-child { border-bottom: none; }
    .related-item:hover { background: #fef2f4; cursor: pointer; }
    .related-item a {
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .related-item-title {
      font-size: 13px;
      font-weight: 500;
      color: #111827;
      line-height: 1.45;
      margin-bottom: 5px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .related-item-meta {
      font-size: 11px;
      color: #9ca3af;
    }

    .skeleton {
      background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skel-line { height: 16px; margin-bottom: 10px; }
    .skel-title { height: 36px; margin-bottom: 16px; width: 85%; }
    .skel-para { height: 14px; margin-bottom: 8px; }

    .error-state {
      text-align: center;
      padding: 60px 24px;
      color: #6b7280;
    }
    .error-state h3 { color: #111827; margin-bottom: 8px; }

    @media print {
      @page { margin: 0; size: A4; }
      body { padding: 1.5cm !important; }
      .nav, .ticker-bar, .article-sidebar, .footer, .btn, .article-top-bar, .breadcrumb { display: none !important; }
      .article-layout { display: block !important; }
      .article-main { max-width: 100% !important; }
    }
    @media (max-width: 768px) {
      .article-sidebar { display: none; }
      .article-layout { display: block; }
      .article-main { max-width: 100%; }
      .article-title { font-size: 22px; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-logo-zd">竑<span>睿投研</span></div>
    <div class="nav-links" id="nav-links"></div>
    <div id="nav-user-info"></div>
    <div class="nav-actions" id="nav-actions"></div>
  </div>
</nav>
<div class="ticker-bar" id="ticker-bar"></div>

<div class="article-page">

  <div class="article-top-bar">
    <a href="javascript:history.back()" class="btn-back btn">← 返回</a>
    <button class="btn-pdf btn" onclick="window.print()">⬇ 导出PDF</button>
    <div class="breadcrumb" id="breadcrumb">
      <a href="index.html">首页</a>
      <span class="breadcrumb-sep">/</span>
      <span id="bc-category">加载中…</span>
      <span class="breadcrumb-sep">/</span>
      <span class="breadcrumb-current" id="bc-title">—</span>
    </div>
  </div>

  <div class="article-layout">
    <div class="article-main" id="article-main">
      <!-- Skeleton loader -->
      <div id="skeleton-loader">
        <div class="skeleton skel-line" style="width:80px;height:22px;margin-bottom:18px;"></div>
        <div class="skeleton skel-title"></div>
        <div class="skeleton skel-line" style="width:60%;"></div>
        <div style="margin-top:28px;">
          <div class="skeleton skel-para" style="width:100%;"></div>
          <div class="skeleton skel-para" style="width:96%;"></div>
          <div class="skeleton skel-para" style="width:88%;"></div>
          <div class="skeleton skel-para" style="width:92%;"></div>
          <div class="skeleton skel-para" style="width:75%;"></div>
        </div>
      </div>
      <div id="article-body" style="display:none;"></div>
      <div id="error-state" style="display:none;" class="error-state">
        <h3>文章加载失败</h3>
        <p>请检查网络连接后重试，或返回上一页。</p>
        <a href="index.html" class="btn btn-primary">返回首页</a>
      </div>
    </div>

    <aside class="article-sidebar">
      <div class="sidebar-card">
        <div class="sidebar-card-header">相关文章</div>
        <ul class="related-list" id="related-list">
          <li style="padding:20px;color:#9ca3af;font-size:13px;">加载中…</li>
        </ul>
      </div>
    </aside>
  </div>

</div>

<footer class="footer">© 2026 竑睿投研 · <a href="#">隐私政策</a> · <a href="#">使用条款</a></footer>

<script src="app.js?v=20260515"></script>
<script>
  const _API = window.API || "https://moomooinsights-production.up.railway.app";

  const AUTHOR_MAP = {
    "Trader Moo": "交易大师",
    "Macro Moo": "宏观大牛",
    "Equity Moo": "证券分析师",
    "Moomoo Insights": "竑睿投研",
    "Moomoo Research Team": "紫东研究团队",
    "Moomoo Investment Research Team": "竑睿投研团队",
    "Moomoo Investment Strategy Team": "竑睿投研团队",
  };
  function xlAuthor(a) { return AUTHOR_MAP[a] || a; }

  const CATEGORY_MAP = {
    "Daily Brief": "每日简报",
    "Market Analysis": "市场分析",
    "Earnings": "财报速递",
    "Macro": "宏观策略",
    "Equity": "股票策略",
    "Credit": "信用策略",
    "Trade Plan": "交易计划",
    "Research": "深度研究",
    "Strategy": "投资策略",
    "Sector": "行业研究",
    "TSLA": "特斯拉",
    "NVDA": "英伟达",
  };
  function xlCategory(c) { return CATEGORY_MAP[c] || c; }

  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const y = d.getFullYear();
    const m = d.getMonth() + 1;
    const day = d.getDate();
    return `${y}年${m}月${day}日`;
  }

  function truncate(str, n) {
    if (!str) return '';
    return str.length > n ? str.slice(0, n) + '…' : str;
  }

  async function loadArticle() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    if (!id) {
      location.href = "index.html";
      return;
    }

    try {
      const res = await fetch(`${_API}/api/articles/${id}`);
      if (!res.ok) throw new Error('Not found');
      const data = await res.json();

      const content = data.content || data;
      const title = content.title_zh_cn || content.title || data.title || '';
      const excerpt = content.excerpt_zh_cn || content.excerpt || data.excerpt || '';
      let bodyHtml = (content.content_html_zh_cn || content.content_html || data.content_html || '').trim();
      bodyHtml = bodyHtml.replace(/^```[a-z]*\s*/i, '').replace(/\s*```$/i, '');
      const author = xlAuthor(data.author || content.author || '');
      const category = xlCategory(data.category || content.category || '');
      const dateStr = formatDate(data.created_at || data.published_at || '');

      // Update page title
      document.title = `${title} — 竑睿投研`;

      // Update breadcrumb
      document.getElementById('bc-category').innerHTML = `<a href="index.html?cat=${encodeURIComponent(data.category || '')}">${category}</a>`;
      document.getElementById('bc-title').textContent = truncate(title, 30);

      // Build article HTML
      const authorInitial = author ? author[0] : '研';
      const articleHtml = `
        <div class="article-category-tag">${category}</div>
        <h1 class="article-title">${title}</h1>
        ${excerpt ? `<p class="article-excerpt">${excerpt}</p>` : ''}
        <div class="article-meta">
          <div class="article-meta-author">
            <div class="author-avatar">${authorInitial}</div>
            <span>${author || '竑睿投研'}</span>
          </div>
          <span>${dateStr}</span>
        </div>
        <div class="article-content">${bodyHtml}</div>
      `;

      document.getElementById('skeleton-loader').style.display = 'none';
      const bodyEl = document.getElementById('article-body');
      bodyEl.innerHTML = articleHtml;
      bodyEl.style.display = 'block';

      // Load related articles
      loadRelated(data.category || '', id);

    } catch (e) {
      console.error(e);
      showError(e.message || String(e));
    }
  }

  async function loadRelated(category, currentId) {
    const listEl = document.getElementById('related-list');
    try {
      const res = await fetch(`${_API}/api/articles?limit=20&category=${encodeURIComponent(category)}`);
      const articles = await res.json();
      const related = (Array.isArray(articles) ? articles : (articles.articles || []))
        .filter(a => String(a.id) !== String(currentId))
        .slice(0, 5);

      if (related.length === 0) {
        listEl.innerHTML = '<li style="padding:16px 20px;color:#9ca3af;font-size:13px;">暂无相关文章</li>';
        return;
      }

      listEl.innerHTML = related.map(a => {
        const t = a.title_zh_cn || a.title || '';
        const d = formatDate(a.created_at || a.published_at || '');
        const cat = xlCategory(a.category || '');
        return `
          <li class="related-item">
            <a href="/article?id=${a.id}">
              <div class="related-item-title">${t}</div>
              <div class="related-item-meta">${cat} · ${d}</div>
            </a>
          </li>
        `;
      }).join('');
    } catch (e) {
      listEl.innerHTML = '<li style="padding:16px 20px;color:#9ca3af;font-size:13px;">相关文章加载失败</li>';
    }
  }

  function showError(detail) {
    document.getElementById('skeleton-loader').style.display = 'none';
    const errEl = document.getElementById('error-state');
    const id = new URLSearchParams(window.location.search).get('id');
    if (detail || !id) {
      const msg = !id ? '未指定文章 ID（请从首页点击文章进入）' : detail;
      errEl.querySelector('p').textContent = msg;
    }
    errEl.style.display = 'block';
  }

  if (typeof renderNav === 'function') renderNav();
  loadArticle();
</script>
</body>
</html>
