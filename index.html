<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>竑睿投研 — 专业投研平台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="app.js" defer></script>
  <style>
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--orange, #e03c2f);
      margin-bottom: 6px;
    }
    .news-section { margin-bottom: 48px; }
    .section-divider { border: none; border-top: 1px solid var(--border, #e5e7eb); margin: 0 0 32px; }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-logo-zd">竑<span>睿投研</span></div>
    <div class="nav-links" id="nav-links"></div>
    <div id="nav-user-info"></div>
    <div class="nav-actions" id="nav-actions"></div>
  </div>
</nav>

<div class="ticker-bar" id="ticker-bar"></div>

<main class="page" id="main">
  <div class="loading-center"><div class="spinner"></div></div>
</main>

<footer class="footer">
  © 2026 竑睿投研 · <a href="#">隐私政策</a> · <a href="#">使用条款</a>
</footer>

<script>
const API = "https://moomooinsights-production.up.railway.app";

async function zdFetch(path) {
  const res = await fetch(`${API}${path}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function translateAuthor(author) {
  const map = {
    "Moomoo Insights": "投研团队",
    "Trader Moo": "交易大师",
    "Madison": "麦迪逊",
    "Cembalest": "策略师",
    "DBS CIO": "星展首席投资官",
  };
  return map[author] || author || "投研团队";
}

function translateCategory(cat) {
  const map = {
    "Daily Brief": "每日简报",
    "Earnings": "财报速递",
    "Market Analysis": "市场深度研究",
    "Macro": "宏观策略",
    "Equity": "股票策略",
    "Credit": "信用策略",
    "TSLA": "特斯拉",
    "NVDA": "英伟达",
  };
  return map[cat] || cat || "投研";
}

const TICKER_THEMES = {
  AAPL:  { g1:'#1d1d1f', g2:'#2d2d2f', accent:'#f5f5f7', name:'AAPL' },
  MSFT:  { g1:'#0058a0', g2:'#003f74', accent:'#50e6ff', name:'MSFT' },
  NVDA:  { g1:'#1a3a00', g2:'#2d5c00', accent:'#76b900', name:'NVDA' },
  AMZN:  { g1:'#b36900', g2:'#7a4800', accent:'#ff9900', name:'AMZN' },
  META:  { g1:'#1877f2', g2:'#0a4fa0', accent:'#a8c8ff', name:'META' },
  GOOGL: { g1:'#1a73e8', g2:'#0d47a1', accent:'#f9ab00', name:'GOOGL' },
  TSLA:  { g1:'#b30000', g2:'#7a0000', accent:'#ff6666', name:'TSLA' },
  JPM:   { g1:'#003087', g2:'#001a4d', accent:'#4a90d9', name:'JPM' },
  MCD:   { g1:'#da291c', g2:'#9a1a10', accent:'#ffbc0d', name:'MCD' },
  CSCO:  { g1:'#049fd9', g2:'#0270a0', accent:'#a0e4f8', name:'CSCO' },
  WMT:   { g1:'#0071ce', g2:'#004c8c', accent:'#ffc220', name:'WMT' },
  UNH:   { g1:'#002677', g2:'#001040', accent:'#00bcd4', name:'UNH' },
  LLY:   { g1:'#c02832', g2:'#8a1a20', accent:'#f9a825', name:'LLY' },
  AMD:   { g1:'#ed1c24', g2:'#a01018', accent:'#fff', name:'AMD' },
  NFLX:  { g1:'#e50914', g2:'#8c0610', accent:'#fff', name:'NFLX' },
  AVGO:  { g1:'#cc2200', g2:'#801400', accent:'#ff9966', name:'AVGO' },
  ORCL:  { g1:'#c74634', g2:'#8a2818', accent:'#f8c85c', name:'ORCL' },
  QCOM:  { g1:'#3253dc', g2:'#1a37aa', accent:'#a0b4ff', name:'QCOM' },
  INTU:  { g1:'#365ebf', g2:'#1e3e8c', accent:'#00b0f5', name:'INTU' },
  CRM:   { g1:'#009edb', g2:'#006c99', accent:'#fff', name:'CRM' },
  NOW:   { g1:'#62d84e', g2:'#3d9830', accent:'#fff', name:'NOW' },
};

const CAT_THEMES = {
  'Daily Brief':     { g1:'#1a1f3c', g2:'#2b2f50', accent:'#f97316', label:'每日简报' },
  'Earnings':        { g1:'#1e3a5f', g2:'#0f2744', accent:'#fbbf24', label:'财报速递' },
  'Macro':           { g1:'#0f2744', g2:'#0a1a30', accent:'#60a5fa', label:'宏观策略' },
  'Equity':          { g1:'#064e3b', g2:'#043a2b', accent:'#34d399', label:'股票策略' },
  'Credit':          { g1:'#1e1b4b', g2:'#14123a', accent:'#a78bfa', label:'信用策略' },
  'Market Analysis': { g1:'#0c4a6e', g2:'#073549', accent:'#38bdf8', label:'市场深度' },
  'TSLA':            { g1:'#b30000', g2:'#7a0000', accent:'#ff6666', label:'TSLA' },
  'NVDA':            { g1:'#1a3a00', g2:'#2d5c00', accent:'#76b900', label:'NVDA' },
};

function generateThumbnailSVG(article, big) {
  const title = article.title || '';
  const cat = article.category || '';
  const id = article.id || 0;
  const h = big ? 320 : 180;

  let theme = CAT_THEMES[cat] || CAT_THEMES['Daily Brief'];
  let mainLabel = theme.label;
  let subLabel = '';

  // For Earnings and trade-plan categories, try to extract ticker
  const tickerExtract = title.match(/^([A-Z]{2,5})[\s:]/);
  if (tickerExtract) {
    const t = tickerExtract[1];
    if (TICKER_THEMES[t]) {
      theme = { ...TICKER_THEMES[t], label: TICKER_THEMES[t].name };
    }
    mainLabel = t;
  } else if (['TSLA','NVDA'].includes(cat)) {
    mainLabel = cat;
    if (TICKER_THEMES[cat]) theme = { ...TICKER_THEMES[cat], label: cat };
  }

  // For Daily Brief, extract date from title
  if (cat === 'Daily Brief') {
    const dm = title.match(/[—–-]\s*(.+)$/);
    if (dm) subLabel = dm[1].trim().slice(0, 20);
  }

  // Seeded pseudo-random bar heights
  const bars = Array.from({length: 10}, (_, i) => {
    const seed = ((id * 7 + i * 17 + i * i * 3) % 100 + 100) % 100;
    return 15 + seed * 0.6;
  });

  const barW = big ? 22 : 14;
  const barGap = big ? 7 : 5;
  const totalW = bars.length * (barW + barGap);
  const bx0 = 200 - totalW / 2;
  const baseY = h - 10;
  const maxBarH = big ? 100 : 65;

  const barsSVG = bars.map((pct, i) => {
    const bh = pct / 100 * maxBarH;
    const x = bx0 + i * (barW + barGap);
    const isAccent = i % 3 === 1;
    const op = 0.25 + (i / bars.length) * 0.45;
    return `<rect x="${x.toFixed(1)}" y="${(baseY - bh).toFixed(1)}" width="${barW}" height="${bh.toFixed(1)}" fill="${isAccent ? theme.accent : '#ffffff'}" opacity="${op.toFixed(2)}" rx="2"/>`;
  }).join('');

  const uid = `t${id}`;
  const mainFontSize = mainLabel.length > 8 ? (big ? 44 : 28) : mainLabel.length > 5 ? (big ? 56 : 36) : (big ? 72 : 48);
  const mainY = big ? (subLabel ? 150 : 160) : (subLabel ? 88 : 95);
  const catLabel = (CAT_THEMES[cat] || CAT_THEMES['Daily Brief']).label;

  // Decorative circle accent top-right
  const circleR = big ? 90 : 55;

  return `<svg viewBox="0 0 400 ${h}" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" style="display:block;" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg${uid}" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="${theme.g1}"/>
      <stop offset="100%" stop-color="${theme.g2}"/>
    </linearGradient>
    <linearGradient id="fade${uid}" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="40%" stop-color="${theme.g2}" stop-opacity="0"/>
      <stop offset="100%" stop-color="${theme.g1}" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="circle${uid}" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="${theme.accent}" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="${theme.accent}" stop-opacity="0.03"/>
    </linearGradient>
  </defs>
  <rect width="400" height="${h}" fill="url(#bg${uid})"/>
  <circle cx="370" cy="-10" r="${circleR}" fill="url(#circle${uid})"/>
  <circle cx="30" cy="${h + 10}" r="${big ? 70 : 40}" fill="${theme.accent}" opacity="0.07"/>
  ${Array.from({length:5},(_,row)=>Array.from({length:9},(_,col)=>
    `<circle cx="${col*50+25}" cy="${row*(h/4)+h/8}" r="1.2" fill="${theme.accent}" opacity="0.09"/>`
  ).join('')).join('')}
  ${barsSVG}
  <rect width="400" height="${h}" fill="url(#fade${uid})"/>
  <rect x="12" y="12" width="${catLabel.length * 8 + 16}" height="22" rx="4" fill="${theme.accent}" opacity="0.18"/>
  <text x="20" y="27" font-family="'Noto Sans SC',system-ui,sans-serif" font-size="11" font-weight="700" fill="${theme.accent}" letter-spacing="0.5">${catLabel}</text>
  <text x="200" y="${mainY}" font-family="'Noto Sans SC',system-ui,sans-serif" font-size="${mainFontSize}" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="middle" letter-spacing="3" opacity="0.95">${mainLabel}</text>
  ${subLabel ? `<text x="200" y="${mainY + mainFontSize * 0.7}" font-family="system-ui,sans-serif" font-size="${big?14:11}" font-weight="400" fill="white" text-anchor="middle" dominant-baseline="middle" opacity="0.6">${subLabel}</text>` : ''}
  <text x="392" y="${h - 8}" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="white" text-anchor="end" opacity="0.35">竑睿投研</text>
</svg>`;
}

function formatDateZH(d) {
  if (!d) return "";
  const dt = new Date(d);
  return dt.toLocaleDateString("zh-CN", { year: "numeric", month: "long", day: "numeric" });
}

function articleCardHTML(a) {
  const title = a.title_zh_cn || a.title;
  const excerpt = a.excerpt_zh_cn || a.excerpt || "";
  const author = translateAuthor(a.author);
  const category = translateCategory(a.category);
  return `
    <div class="article-card" onclick="location.href='article.html?id=${a.id}'">
      <div class="article-card-img-placeholder" style="padding:0;overflow:hidden;">${generateThumbnailSVG(a, false)}</div>
      <div class="article-card-body">
        <div class="article-card-category">${category}</div>
        <div class="article-card-title">${title}</div>
        <div class="article-card-excerpt">${excerpt}</div>
        <div class="article-card-meta">
          <span>${author}</span>
          <span class="dot">·</span>
          <span>${formatDateZH(a.created_at)}</span>
        </div>
      </div>
    </div>`;
}

async function loadPage() {
  try {
    const articles = await zdFetch("/api/articles");
    const main = document.getElementById("main");

    if (!articles.length) {
      main.innerHTML = `<div class="empty-state"><div class="icon">📰</div><p>暂无文章，请稍后再来。</p></div>`;
      return;
    }

    const dailyBriefs    = articles.filter(a => a.category === "Daily Brief");
    const earningsArts   = articles.filter(a => a.category === "Earnings");
    const marketAnalysis = articles.filter(a => ["Market Analysis","Macro","Equity","Credit"].includes(a.category));
    const tradePlans     = articles.filter(a => ["TSLA","NVDA"].includes(a.category));

    // Featured = most recently published across dailyBriefs, earningsArts, marketAnalysis
    const candidates = [...dailyBriefs, ...earningsArts, ...marketAnalysis];
    let featured = null;
    if (candidates.length) {
      featured = candidates.reduce((a, b) =>
        new Date(a.created_at) > new Date(b.created_at) ? a : b
      );
    } else if (articles.length) {
      featured = articles[0];
    }

    let html = "";

    // Hero
    if (featured) {
      const heroTitle = featured.title_zh_cn || featured.title;
      const heroExcerpt = featured.excerpt_zh_cn || featured.excerpt || "";
      html += `
        <div class="hero-article" onclick="location.href='article.html?id=${featured.id}'">
          <div class="hero-article-img" style="padding:0;overflow:hidden;">${generateThumbnailSVG(featured, true)}</div>
          <div class="hero-article-body">
            <span class="hero-tag">${translateCategory(featured.category)}</span>
            <h1 class="hero-title">${heroTitle}</h1>
            <p class="hero-excerpt">${heroExcerpt}</p>
            <div class="hero-meta">${translateAuthor(featured.author)} · ${formatDateZH(featured.created_at)}</div>
          </div>
        </div>
      `;
    }

    // ── Section 1: 每日简报 ──────────────────────────────────────────
    html += `<hr class="section-divider">`;
    html += `<div class="news-section">`;
    html += `<div class="section-label">Daily Brief</div>`;
    html += `<div class="section-head" style="margin-bottom:20px;"><h2>每日简报</h2></div>`;
    if (dailyBriefs.length) {
      const briefs = dailyBriefs.slice(0, 6).filter(a => !featured || a.id !== featured.id);
      const toRender = briefs.length ? briefs : dailyBriefs.slice(0, 6);
      html += `<div class="grid-3">${toRender.map(articleCardHTML).join("")}</div>`;
    } else {
      html += `<div class="empty-state" style="padding:24px 0;"><p>每日简报将于每个交易日上午 8:30（香港时间）发布。</p></div>`;
    }
    html += `</div>`;

    // ── Section 2: 财报速递 ────────────────────────────────────────
    html += `<hr class="section-divider">`;
    html += `<div class="news-section">`;
    html += `<div class="section-label">Earnings</div>`;
    html += `<div class="section-head" style="margin-bottom:20px;"><h2>财报速递</h2></div>`;
    if (earningsArts.length) {
      const earnings = earningsArts.slice(0, 6).filter(a => !featured || a.id !== featured.id);
      const toRender = earnings.length ? earnings : earningsArts.slice(0, 6);
      html += `<div class="grid-3">${toRender.map(articleCardHTML).join("")}</div>`;
    } else {
      html += `<div class="empty-state" style="padding:24px 0;"><p>财报预告与点评将在每个财报季自动更新。</p></div>`;
    }
    html += `</div>`;

    // ── Section 3: 市场深度研究 ────────────────────────────────────
    html += `<hr class="section-divider">`;
    html += `<div class="news-section">`;
    html += `<div class="section-label">Market Analysis</div>`;
    html += `<div class="section-head" style="margin-bottom:20px;"><h2>市场深度研究</h2></div>`;
    if (marketAnalysis.length) {
      const ma = marketAnalysis.slice(0, 6).filter(a => !featured || a.id !== featured.id);
      const toRender = ma.length ? ma : marketAnalysis.slice(0, 6);
      html += `<div class="grid-3">${toRender.map(articleCardHTML).join("")}</div>`;
    } else {
      html += `<div class="empty-state" style="padding:24px 0;"><p>深度主题研究每周四、五发布。</p></div>`;
    }
    html += `</div>`;

    // ── Section 4: 交易计划 ────────────────────────────────────────
    html += `<hr class="section-divider">`;
    html += `<div class="news-section">`;
    html += `<div class="section-label">Trade Plans</div>`;
    html += `<div class="section-head" style="margin-bottom:20px;"><h2>交易计划</h2></div>`;
    if (tradePlans.length) {
      html += `<div class="grid-3">${tradePlans.slice(0, 6).map(articleCardHTML).join("")}</div>`;
    } else {
      html += `<div class="empty-state" style="padding:24px 0;"><p>每个交易日下午5时（香港时间）发布 TSLA 及 NVDA 交易计划。</p></div>`;
    }
    html += `</div>`;

    main.innerHTML = html;
  } catch (e) {
    document.getElementById("main").innerHTML = `
      <div class="empty-state">
        <div class="icon">⚠️</div>
        <p>无法加载文章，请检查网络连接。<br><small>${e.message}</small></p>
      </div>`;
  }
}

document.addEventListener("DOMContentLoaded", () => {
  // Override renderNav for Zidong branding if app.js is loaded
  loadPage();
});
</script>
</body>
</html>
