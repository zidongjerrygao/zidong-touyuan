<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>投研社区 — 竑睿投研</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=20260515" />
  <style>
    .community-page {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px 64px;
    }
    .page-header { margin-bottom: 32px; }
    .page-header h1 { font-size: 28px; font-weight: 900; color: #111827; margin: 0 0 8px; }
    .page-header p { font-size: 15px; color: #6b7280; margin: 0; }

    .community-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .filter-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn {
      padding: 7px 14px;
      border-radius: 20px;
      border: 1.5px solid #e5e7eb;
      background: #fff;
      color: #374151;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Noto Sans SC', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: #C41230; color: #C41230; }
    .filter-btn.active { background: #C41230; border-color: #C41230; color: #fff; }

    .btn-new-post {
      padding: 9px 20px;
      background: #C41230;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Noto Sans SC', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-new-post:hover { background: #a30e28; }

    .posts-list { display: flex; flex-direction: column; gap: 14px; }

    .community-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 20px 24px;
      transition: box-shadow 0.15s, border-color 0.15s;
      cursor: pointer;
    }
    .community-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); border-color: #fca5a5; }
    .community-card-category {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 4px;
      background: #fef2f4;
      color: #C41230;
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .community-card-title { font-size: 16px; font-weight: 700; color: #111827; margin: 0 0 8px; line-height: 1.4; }
    .community-card-body {
      font-size: 13px; color: #6b7280; line-height: 1.6; margin: 0 0 14px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .community-card-footer {
      display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: #9ca3af;
    }
    .community-card-author { display: flex; align-items: center; gap: 6px; }
    .mini-avatar {
      width: 22px; height: 22px; border-radius: 50%;
      background: linear-gradient(135deg, #C41230, #6B0A1A);
      color: #fff; font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .comment-count { display: flex; align-items: center; gap: 4px; }
    .comment-count svg { width: 13px; height: 13px; }

    .empty-state { text-align: center; padding: 60px 24px; color: #6b7280; }
    .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { color: #111827; margin-bottom: 8px; font-size: 17px; }
    .empty-state p { font-size: 14px; }

    .skeleton {
      background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 4px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skel-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 20px 24px; }

    /* Modals */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000;
      display: flex; align-items: center; justify-content: center; padding: 24px;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: #fff; border-radius: 14px; padding: 32px;
      width: 100%; max-width: 540px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      transform: translateY(16px); transition: transform 0.2s;
      max-height: 85vh; overflow-y: auto;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-wide { max-width: 700px; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .modal-title { font-size: 18px; font-weight: 700; color: #111827; }
    .modal-close {
      width: 32px; height: 32px; border-radius: 50%; border: none; background: #f3f4f6;
      color: #6b7280; font-size: 18px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: background 0.12s; flex-shrink: 0;
    }
    .modal-close:hover { background: #e5e7eb; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 10px 14px; border: 1.5px solid #e5e7eb; border-radius: 8px;
      font-size: 14px; font-family: 'Noto Sans SC', sans-serif; color: #111827;
      background: #fafafa; outline: none; transition: border-color 0.15s; box-sizing: border-box;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #C41230; background: #fff; }
    .form-group textarea { resize: vertical; min-height: 120px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }
    .btn-cancel {
      padding: 9px 20px; border: 1.5px solid #e5e7eb; border-radius: 8px; background: #fff;
      color: #374151; font-size: 14px; font-family: 'Noto Sans SC', sans-serif; cursor: pointer;
    }
    .btn-cancel:hover { background: #f3f4f6; }
    .btn-submit {
      padding: 9px 24px; background: #C41230; color: #fff; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 700; font-family: 'Noto Sans SC', sans-serif; cursor: pointer;
    }
    .btn-submit:hover { background: #a30e28; }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .modal-error {
      margin-top: 12px; padding: 9px 12px; background: #fef2f4;
      border: 1px solid #fca5a5; border-radius: 6px; color: #b91c1c; font-size: 13px; display: none;
    }
    .modal-error.visible { display: block; }

    .comment-item { padding: 12px 0; border-bottom: 1px solid #f3f4f6; }
    .comment-item:last-child { border-bottom: none; }
    .comment-author { font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 4px; }
    .comment-author span { font-weight: 400; color: #9ca3af; }
    .comment-body { font-size: 14px; color: #4b5563; line-height: 1.6; }

    @media (max-width: 640px) {
      .community-page { padding: 24px 16px 48px; }
      .community-toolbar { flex-direction: column; align-items: flex-start; }
      .btn-new-post { width: 100%; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-logo-zd">竑<span>睿投研</span></div>
    <div class="nav-links" id="nav-links"></div>
    <div id="nav-user-info"></div>
    <div class="nav-actions" id="nav-actions"></div>
  </div>
</nav>
<div class="ticker-bar" id="ticker-bar"></div>

<div class="community-page">
  <div class="page-header">
    <h1>投研社区</h1>
    <p>与紫东研究团队及投资者交流探讨</p>
  </div>

  <div class="community-toolbar">
    <div class="filter-tabs" id="filter-tabs">
      <button class="filter-btn active" data-cat="">全部</button>
      <button class="filter-btn" data-cat="综合讨论">综合讨论</button>
      <button class="filter-btn" data-cat="市场资讯">市场资讯</button>
      <button class="filter-btn" data-cat="财报分析">财报分析</button>
      <button class="filter-btn" data-cat="投资策略">投资策略</button>
      <button class="filter-btn" data-cat="投教知识">投教知识</button>
    </div>
    <button class="btn-new-post" onclick="openNewPost()">+ 发布话题</button>
  </div>

  <div class="posts-list" id="posts-list">
    <div class="skel-card"><div class="skeleton" style="height:13px;width:60px;margin-bottom:12px;"></div><div class="skeleton" style="height:18px;width:80%;margin-bottom:10px;"></div><div class="skeleton" style="height:13px;width:100%;margin-bottom:6px;"></div><div class="skeleton" style="height:13px;width:70%;"></div></div>
    <div class="skel-card"><div class="skeleton" style="height:13px;width:60px;margin-bottom:12px;"></div><div class="skeleton" style="height:18px;width:65%;margin-bottom:10px;"></div><div class="skeleton" style="height:13px;width:100%;margin-bottom:6px;"></div><div class="skeleton" style="height:13px;width:55%;"></div></div>
    <div class="skel-card"><div class="skeleton" style="height:13px;width:60px;margin-bottom:12px;"></div><div class="skeleton" style="height:18px;width:72%;margin-bottom:10px;"></div><div class="skeleton" style="height:13px;width:100%;margin-bottom:6px;"></div><div class="skeleton" style="height:13px;width:82%;"></div></div>
  </div>
</div>

<!-- New Post Modal -->
<div class="modal-overlay" id="new-post-modal" onclick="handleOverlayClick(event,'new-post-modal')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">发布新话题</div>
      <button class="modal-close" onclick="closeModal('new-post-modal')">×</button>
    </div>
    <form id="post-form" onsubmit="submitPost(event)">
      <div class="form-group">
        <label>话题标题</label>
        <input type="text" id="post-title" placeholder="输入话题标题" required maxlength="100" />
      </div>
      <div class="form-group">
        <label>分类</label>
        <select id="post-category" required>
          <option value="">请选择分类</option>
          <option value="综合讨论">综合讨论</option>
          <option value="市场资讯">市场资讯</option>
          <option value="财报分析">财报分析</option>
          <option value="投资策略">投资策略</option>
          <option value="投教知识">投教知识</option>
        </select>
      </div>
      <div class="form-group">
        <label>内容</label>
        <textarea id="post-body" placeholder="分享您的观点或问题…" required minlength="10"></textarea>
      </div>
      <div class="modal-error" id="new-post-error"></div>
      <div class="modal-actions">
        <button type="button" class="btn-cancel" onclick="closeModal('new-post-modal')">取消</button>
        <button type="submit" class="btn-submit" id="btn-submit-post">发布</button>
      </div>
    </form>
  </div>
</div>

<!-- Post Detail Modal -->
<div class="modal-overlay" id="post-detail-modal" onclick="handleOverlayClick(event,'post-detail-modal')">
  <div class="modal modal-wide">
    <div class="modal-header">
      <div class="modal-title" id="detail-title">话题详情</div>
      <button class="modal-close" onclick="closeModal('post-detail-modal')">×</button>
    </div>
    <div id="post-detail-content"></div>
    <hr style="margin:20px 0;border:none;border-top:1px solid #e5e7eb;" />
    <div id="comments-section"></div>
    <div id="comment-form"></div>
  </div>
</div>

<footer class="footer">© 2026 竑睿投研 · <a href="#">隐私政策</a> · <a href="#">使用条款</a></footer>

<script src="app.js?v=20260515"></script>
<script>
const API = "https://moomooinsights-production.up.railway.app";
let allPosts = [];
let currentCat = '';

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;
  const mins = Math.floor(diff / 60000);
  const hrs = Math.floor(diff / 3600000);
  const days = Math.floor(diff / 86400000);
  if (mins < 1) return '刚刚';
  if (mins < 60) return `${mins}分钟前`;
  if (hrs < 24) return `${hrs}小时前`;
  if (days < 7) return `${days}天前`;
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
}

function renderPosts(posts) {
  const list = document.getElementById('posts-list');
  if (!posts || posts.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">💬</div><h3>暂无讨论话题</h3><p>成为第一个发帖的人！</p></div>`;
    return;
  }
  list.innerHTML = posts.map(p => {
    const body = p.body || p.content || '';
    const author = p.author || p.username || p.display_name || '匿名用户';
    const initial = (author[0] || '用').toUpperCase();
    const comments = p.comment_count || p.comments_count || 0;
    return `
      <div class="community-card" onclick="openPost(${p.id})">
        ${p.category ? `<div class="community-card-category">${p.category}</div>` : ''}
        <div class="community-card-title">${p.title || '无标题'}</div>
        ${body ? `<div class="community-card-body">${body.replace(/<[^>]+>/g,'')}</div>` : ''}
        <div class="community-card-footer">
          <div class="community-card-author">
            <div class="mini-avatar">${initial}</div>
            <span>${author}</span>
            <span style="color:#d1d5db;">·</span>
            <span>${formatDate(p.created_at)}</span>
          </div>
          <div class="comment-count">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 10c0-4 3.6-7 8-7s8 3 8 7-3.6 7-8 7c-1.2 0-2.3-.2-3.3-.6L2 18l1.2-3.8C2.4 12.9 2 11.5 2 10z"/></svg>
            <span>${comments}</span>
          </div>
        </div>
      </div>`;
  }).join('');
}

async function loadPosts() {
  try {
    const url = currentCat
      ? `${API}/api/community?category=${encodeURIComponent(currentCat)}`
      : `${API}/api/community`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('加载失败');
    const data = await res.json();
    allPosts = Array.isArray(data) ? data : (data.posts || data.results || []);
    renderPosts(allPosts);
  } catch (e) {
    document.getElementById('posts-list').innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><h3>加载失败</h3><p>请刷新页面重试</p></div>`;
  }
}

document.getElementById('filter-tabs').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
  loadPosts();
});

async function openPost(id) {
  try {
    const res = await fetch(`${API}/api/community/${id}`);
    if (!res.ok) throw new Error('加载失败');
    const p = await res.json();
    const token = localStorage.getItem('zidong_token');
    let userObj = null;
    try { userObj = JSON.parse(localStorage.getItem('zidong_user')); } catch {}

    document.getElementById('detail-title').textContent = p.title || '话题详情';
    document.getElementById('post-detail-content').innerHTML = `
      ${p.category ? `<span style="display:inline-block;padding:2px 9px;border-radius:4px;background:#fef2f4;color:#C41230;font-size:11px;font-weight:700;margin-bottom:12px;">${p.category}</span>` : ''}
      <h2 style="font-size:20px;font-weight:800;color:#111827;margin:0 0 8px;">${p.title || ''}</h2>
      <div style="font-size:13px;color:#9ca3af;margin-bottom:16px;">${p.author || '匿名用户'} · ${formatDate(p.created_at)}</div>
      <div style="font-size:15px;line-height:1.75;color:#374151;white-space:pre-wrap;">${(p.body || '').replace(/<[^>]+>/g,'')}</div>
    `;

    const comments = p.comments || [];
    const commentsHTML = comments.length
      ? comments.map(c => `
          <div class="comment-item">
            <div class="comment-author">${c.author || '匿名'} <span>· ${formatDate(c.created_at)}</span></div>
            <div class="comment-body">${c.body || ''}</div>
          </div>`).join('')
      : `<p style="color:#9ca3af;font-size:14px;padding:8px 0;">暂无评论，来发表第一条吧！</p>`;

    document.getElementById('comments-section').innerHTML = `
      <div style="font-weight:700;font-size:15px;margin-bottom:12px;">评论 (${comments.length})</div>
      ${commentsHTML}
    `;

    document.getElementById('comment-form').innerHTML = token
      ? `<div style="margin-top:16px;">
           <textarea id="comment-input" style="width:100%;padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;font-family:'Noto Sans SC',sans-serif;min-height:80px;resize:vertical;outline:none;box-sizing:border-box;" placeholder="发表评论…"></textarea>
           <div style="margin-top:8px;text-align:right;">
             <button onclick="submitComment(${id})" style="padding:8px 20px;background:#C41230;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;font-family:'Noto Sans SC',sans-serif;cursor:pointer;">发布评论</button>
           </div>
         </div>`
      : `<div style="margin-top:16px;font-size:13px;color:#9ca3af;"><a href="login.html" style="color:#C41230;">登录</a> 后发表评论</div>`;

    openModal('post-detail-modal');
  } catch (e) {
    alert('加载话题失败，请重试');
  }
}

async function submitComment(postId) {
  const body = document.getElementById('comment-input')?.value.trim();
  if (!body) return;
  const token = localStorage.getItem('zidong_token');
  if (!token) { closeModal('post-detail-modal'); window.location.href = 'login.html'; return; }
  try {
    const res = await fetch(`${API}/api/community/${postId}/comments`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ body })
    });
    if (!res.ok) throw new Error('发布失败');
    openPost(postId);
  } catch (e) {
    alert('评论发布失败：' + e.message);
  }
}

function openNewPost() {
  const token = localStorage.getItem('zidong_token');
  if (!token) {
    window.location.href = 'login.html?redirect=' + encodeURIComponent('community.html');
    return;
  }
  openModal('new-post-modal');
}

async function submitPost(e) {
  e.preventDefault();
  const token = localStorage.getItem('zidong_token');
  if (!token) { closeModal('new-post-modal'); openNewPost(); return; }
  const title = document.getElementById('post-title').value.trim();
  const category = document.getElementById('post-category').value;
  const body = document.getElementById('post-body').value.trim();
  const btn = document.getElementById('btn-submit-post');
  const errEl = document.getElementById('new-post-error');
  errEl.classList.remove('visible');
  btn.disabled = true; btn.textContent = '发布中…';
  try {
    const res = await fetch(`${API}/api/community`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ title, category, body })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || data.message || '发布失败');
    closeModal('new-post-modal');
    document.getElementById('post-form').reset();
    allPosts.unshift(data);
    renderPosts(allPosts);
  } catch (err) {
    errEl.textContent = err.message || '发布失败，请重试';
    errEl.classList.add('visible');
    btn.disabled = false; btn.textContent = '发布';
  }
}

function openModal(id) { document.getElementById(id)?.classList.add('open'); document.body.style.overflow = 'hidden'; }
function closeModal(id) { document.getElementById(id)?.classList.remove('open'); document.body.style.overflow = ''; }
function handleOverlayClick(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }

if (typeof renderNav === 'function') renderNav();
loadPosts();
</script>
</body>
</html>
