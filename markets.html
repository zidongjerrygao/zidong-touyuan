<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>市场行情 — 竑睿投研</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=20260515c" />
  <script src="app.js?v=20260515b" defer></script>
  <style>
    .mover-up { color: #16a34a; font-weight: 700; }
    .mover-dn { color: #dc2626; font-weight: 700; }
    .source-tag { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .beat-pill  { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; }
    .beat-pos   { background: #dcfce7; color: #166534; }
    .beat-neg   { background: #fee2e2; color: #991b1b; }
    .beat-neu   { background: #f1f5f9; color: #64748b; }
    .day-badge  { display: inline-block; padding: 2px 7px; border-radius: 6px; font-size: 11px; font-weight: 600; background: #f0f4ff; color: #3b5bdb; }
    .earnings-row:hover td { background: #fafafa; }
    .earn-filter { padding: 4px 12px; border-radius: 16px; border: 1px solid var(--border); background: #fff; font-size: 12px; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
    .earn-filter:hover { border-color: var(--orange); color: var(--orange); }
    .earn-filter.active { background: var(--orange); border-color: var(--orange); color: #fff; }
    .filter-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .section-gap { height: 40px; }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-logo-zd">竑<span>睿投研</span></div>
    <div class="nav-links" id="nav-links"></div>
    <div id="nav-user-info"></div>
    <div class="nav-actions" id="nav-actions"></div>
  </div>
</nav>

<div class="ticker-bar" id="ticker-bar"></div>

<main class="page">

  <!-- 市场指数 -->
  <div class="section-head" style="margin-bottom:16px;">
    <h2>市场行情</h2>
    <span class="source-tag" id="data-source">加载中…</span>
  </div>

  <div class="section-head" style="margin-bottom:12px;">
    <h3 style="font-size:16px;font-weight:700;color:var(--text);">市场指数</h3>
  </div>
  <div class="grid-4" id="index-cards">
    <div class="stat-card"><div class="label">—</div><div class="value">—</div><div class="change">加载中…</div></div>
    <div class="stat-card"><div class="label">—</div><div class="value">—</div><div class="change">加载中…</div></div>
    <div class="stat-card"><div class="label">—</div><div class="value">—</div><div class="change">加载中…</div></div>
    <div class="stat-card"><div class="label">—</div><div class="value">—</div><div class="change">加载中…</div></div>
  </div>

  <div class="section-gap"></div>

  <!-- 个股动态 -->
  <div class="section-head" style="margin-bottom:12px;">
    <h3 style="font-size:16px;font-weight:700;color:var(--text);">个股动态</h3>
  </div>
  <div class="card" style="margin-bottom:32px;">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>代码</th>
            <th>名称</th>
            <th>价格（美元）</th>
            <th>涨跌幅</th>
          </tr>
        </thead>
        <tbody id="movers-body">
          <tr><td colspan="4" style="text-align:center;padding:24px;color:var(--text-muted);">加载中…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 财报日历 -->
  <div class="section-head" style="margin-bottom:12px;">
    <h3 style="font-size:16px;font-weight:700;color:var(--text);">即将公布财报</h3>
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
      <button class="earn-filter active" data-days="7" onclick="setEarnFilter(this)">未来7天</button>
      <button class="earn-filter" data-days="14" onclick="setEarnFilter(this)">未来14天</button>
      <button class="earn-filter" data-days="30" onclick="setEarnFilter(this)">未来30天</button>
      <button class="earn-filter" data-days="0" onclick="setEarnFilter(this)">全部待公布</button>
    </div>
  </div>
  <div class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>日期</th>
            <th>代码</th>
            <th>公司</th>
            <th>板块</th>
          </tr>
        </thead>
        <tbody id="earnings-body">
          <tr><td colspan="4" style="text-align:center;padding:24px;color:var(--text-muted);">加载中…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</main>

<footer class="footer">
  © 2026 竑睿投研 · <a href="#">隐私政策</a> · <a href="#">使用条款</a>
</footer>

<script>
const API = "https://moomooinsights-production.up.railway.app";

const INDEX_NAMES = {
  SPX: "标普500",
  NDX: "纳斯达克100",
  DJI: "道琼斯",
  VIX: "恐慌指数",
};

function formatPrice(price, symbol) {
  if (!price) return "—";
  if (symbol === "USDSGD") return price.toFixed(4);
  if (price > 10000) return price.toLocaleString("zh-CN", { maximumFractionDigits: 0 });
  return price.toLocaleString("zh-CN", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}


function dayLabel(dateStr) {
  const days = ["周日","周一","周二","周三","周四","周五","周六"];
  const d = new Date(dateStr + "T00:00:00");
  return `<span class="day-badge">${days[d.getDay()]} ${dateStr.slice(5)}</span>`;
}

async function loadMarkets() {
  try {
    const data = await fetch(`${API}/api/markets`).then(r => r.json());

    const srcEl = document.getElementById("data-source");
    if (data.as_of) {
      srcEl.textContent = `数据来源：雅虎财经 · ${new Date(data.as_of).toLocaleTimeString("zh-CN")}`;
    } else {
      srcEl.textContent = "数据来源：雅虎财经";
    }

    // Index cards — show SPX, NDX, DJI
    const indexOrder = ["SPX", "NDX", "DJI"];
    const allIndices = data.indices || [];
    const toShow = indexOrder.map(sym => allIndices.find(i => i.symbol === sym)).filter(Boolean);

    const cards = document.getElementById("index-cards");
    if (toShow.length) {
      cards.style.gridTemplateColumns = `repeat(3, 1fr)`;
      cards.innerHTML = toShow.map(i => {
        const cls = i.change_pct >= 0 ? "up" : "dn";
        const sign = i.change_pct >= 0 ? "+" : "";
        const displayName = INDEX_NAMES[i.symbol] || i.name || i.symbol;
        return `<div class="stat-card">
          <div class="label">${displayName}</div>
          <div class="value">${formatPrice(i.price, i.symbol)}</div>
          <div class="change ${cls}">${sign}${(i.change || 0).toFixed(2)} &nbsp;<span style="opacity:0.8">(${sign}${i.change_pct.toFixed(2)}%)</span></div>
        </div>`;
      }).join("");
    }

    // Movers
    const movers = data.movers || [];
    const tbody = document.getElementById("movers-body");
    if (!movers.length) {
      tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--text-muted);">暂无个股动态数据</td></tr>`;
    } else {
      tbody.innerHTML = movers.map(m => {
        const cls = m.change_pct >= 0 ? "mover-up" : "mover-dn";
        const sign = m.change_pct >= 0 ? "+" : "";
        return `<tr>
          <td><strong>${m.ticker}</strong></td>
          <td>${m.name || "—"}</td>
          <td>$${m.price.toFixed(2)}</td>
          <td class="${cls}">${sign}${m.change_pct.toFixed(2)}%</td>
        </tr>`;
      }).join("");
    }
  } catch (e) {
    document.getElementById("index-cards").innerHTML =
      `<div style="grid-column:1/-1;padding:20px;color:var(--text-muted);">无法加载市场数据：${e.message}</div>`;
  }
}

let _earnDays = 7;

function setEarnFilter(btn) {
  document.querySelectorAll(".earn-filter").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  _earnDays = parseInt(btn.dataset.days);
  loadEarnings();
}

async function loadEarnings() {
  const tbody = document.getElementById("earnings-body");
  tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--text-muted);">加载中…</td></tr>`;
  try {
    const today = new Date();
    let url = `${API}/api/earnings?upcoming=true`;
    if (_earnDays > 0) {
      const to = new Date(today);
      to.setDate(to.getDate() + _earnDays);
      url += `&to_date=${to.toISOString().slice(0, 10)}`;
    }
    const data = await fetch(url).then(r => r.json());
    const rows = Array.isArray(data) ? data : (data.items || data.earnings || []);
    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--text-muted);">暂无即将公布的财报数据</td></tr>`;
      return;
    }
    tbody.innerHTML = rows.slice(0, 30).map(r => `<tr class="earnings-row">
      <td>${dayLabel(r.report_date)}</td>
      <td><strong>${r.ticker}</strong></td>
      <td>${r.name || "—"}</td>
      <td><span class="tag">${r.sector || "—"}</span></td>
    </tr>`).join("");
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--text-muted);">无法加载财报数据：${e.message}</td></tr>`;
  }
}

document.addEventListener("DOMContentLoaded", () => {
  loadMarkets();
  loadEarnings();
  setInterval(loadMarkets, 60000);
});
</script>
</body>
</html>
